{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1>My Profile</h1>
        <div class="breadcrumb">Home > Profile</div>
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 2fr; gap: 24px;">
    <!-- Profile Card -->
    <div class="card" style="text-align: center; height: fit-content;">
        <div class="avatar" style="width: 120px; height: 120px; font-size: 3rem; margin: 0 auto 20px;">{{ current_user.username[0]|upper }}</div>
        <button class="btn btn-outline" style="margin-bottom: 20px;">Change Photo</button>
        <h2 style="margin-bottom: 5px;">{{ current_user.full_name or current_user.username }}</h2>
        <p style="color: var(--color-text-muted); margin-bottom: 15px;">{{ current_user.email }}</p>
        <span class="role-badge">{{ current_user.role.name }}</span>
    </div>

    <!-- Edit Profile Form -->
    <div style="display: flex; flex-direction: column; gap: 24px;">
        <div class="card">
            <h3 style="margin-bottom: 20px; border-bottom: 1px solid var(--color-border); padding-bottom: 10px;">Personal Information</h3>
            <form>
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" value="{{ current_user.full_name }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" value="{{ current_user.email }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" value="{{ current_user.phone or '' }}">
                </div>
                <button type="button" class="btn btn-primary">Save Changes</button>
            </form>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 20px; border-bottom: 1px solid var(--color-border); padding-bottom: 10px;">Change Password</h3>
            <form>
                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-control">
                    <div style="height: 4px; background-color: var(--color-border); border-radius: 2px; margin-top: 8px; overflow: hidden;">
                        <div style="height: 100%; width: 0%; background-color: var(--color-success); transition: width 0.3s;"></div>
                    </div>
                    <div style="font-size: 0.75rem; color: var(--color-text-muted); margin-top: 4px;">Password strength</div>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control">
                </div>
                <button type="button" class="btn btn-primary">Update Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
