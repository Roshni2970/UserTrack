{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Reports & Analytics</h1>
        <div class="breadcrumb">Home > Reports</div>
    </div>
    <div style="display: flex; gap: 16px;">
        <input type="date" class="form-control" value="2026-01-01">
        <span style="align-self: center;">to</span>
        <input type="date" class="form-control" value="2026-12-31">
        <button class="btn btn-primary">Export Report</button>
    </div>
</div>

<div class="card" style="margin-bottom: 24px;">
    <div style="display: flex; border-bottom: 1px solid var(--color-border); margin-bottom: 20px; gap: 20px;">
        <div style="padding-bottom: 10px; border-bottom: 2px solid var(--color-primary); color: var(--color-primary); font-weight: 500; cursor: pointer;">User Growth</div>
        <div style="padding-bottom: 10px; color: var(--color-text-muted); cursor: pointer;">Role Distribution</div>
        <div style="padding-bottom: 10px; color: var(--color-text-muted); cursor: pointer;">Department Breakdown</div>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 3fr; gap: 24px;">
        <div>
            <div class="card" style="background-color: rgba(99, 102, 241, 0.05); border: none; margin-bottom: 16px;">
                <div style="font-size: 0.875rem; color: var(--color-text-muted);">Total Growth</div>
                <div style="font-size: 2rem; font-weight: 700; color: var(--color-primary);">+24%</div>
            </div>
            <div class="card" style="background-color: rgba(16, 185, 129, 0.05); border: none;">
                <div style="font-size: 0.875rem; color: var(--color-text-muted);">Avg. per Month</div>
                <div style="font-size: 2rem; font-weight: 700; color: var(--color-success);">142</div>
            </div>
        </div>
        
        <div style="height: 300px;">
            <canvas id="growthChart"></canvas>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    new Chart(document.getElementById('growthChart'), {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'],
            datasets: [{
                label: 'Registered Users',
                data: [150, 180, 220, 250, 310, 350, 410],
                borderColor: '#3730A3',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(55, 48, 163, 0.1)'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'top' } }
        }
    });
</script>
{% endblock %}
